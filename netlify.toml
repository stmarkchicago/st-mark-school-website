# Netlify configuration for St. Mark Christian School

[build]
  # Build command
  command = "npm run build"
  
  # Publish directory
  publish = "dist"

[build.environment]
  # Node version
  NODE_VERSION = "20"
  # Set base path for the app
  PUBLIC_BASE_PATH = "/app"

# IMPORTANT: Order matters! Static files first, then dynamic routes

# Serve static admin files (highest priority)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# Serve static files and assets
[[redirects]]
  from = "/_astro/*"
  to = "/_astro/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/downloads/*"
  to = "/downloads/:splat"
  status = 200
  force = true

# Handle root redirect to /app
[[redirects]]
  from = "/"
  to = "/app"
  status = 301

# All /app routes go to Netlify function
[[redirects]]
  from = "/app/*"
  to = "/.netlify/functions/entry"
  status = 200

# Catch-all for other requests
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/entry"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
