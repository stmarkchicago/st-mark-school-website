# Netlify configuration for St. Mark Christian School

[build]
  # Build command
  command = "npm run build"
  
  # Publish directory
  publish = "dist"

[build.environment]
  # Node version
  NODE_VERSION = "20"
  # Set base path for the app
  PUBLIC_BASE_PATH = "/app"

# IMPORTANT: Order matters! Most specific routes first

# Serve admin panel at root (DO NOT redirect to /app)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200
  force = true

# Serve static assets (DO NOT redirect to /app)
[[redirects]]
  from = "/_astro/*"
  to = "/_astro/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/downloads/*"
  to = "/downloads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/favicon.ico"
  to = "/favicon.ico"
  status = 200
  force = true

# Netlify Identity endpoints (DO NOT redirect)
[[redirects]]
  from = "/.netlify/*"
  to = "/.netlify/:splat"
  status = 200
  force = true

# Redirect ONLY root to /app (not /admin or static files)
[[redirects]]
  from = "/"
  to = "/app"
  status = 302
  force = false

# All /app routes go to Netlify function
[[redirects]]
  from = "/app/*"
  to = "/.netlify/functions/entry"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
