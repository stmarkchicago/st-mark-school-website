# Netlify configuration for St. Mark Christian School

[build]
  # Build command
  command = "npm run build"
  
  # Publish directory
  publish = "dist"
  
  # Functions directory (if needed)
  functions = "netlify/functions"

[build.environment]
  # Node version
  NODE_VERSION = "20"
  # Set base path for the app
  PUBLIC_BASE_PATH = "/app"

# Redirect rules

# Admin panel at root level (required for Netlify Identity)
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/:splat"
  status = 200

# Handle root redirect to /app
[[redirects]]
  from = "/"
  to = "/app"
  status = 301

# SPA fallback for all routes under /app (but not /admin)
[[redirects]]
  from = "/app/*"
  to = "/.netlify/functions/entry"
  status = 200

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/app/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Identity and Git Gateway are configured in the Netlify UI
